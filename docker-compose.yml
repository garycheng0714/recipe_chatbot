services:
  elasticsearch:
#    build:
#      context: ./elasticsearch
    image: elasticsearch:9.1.4
    container_name: es
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  kibana:
    image: kibana:9.1.4
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://es:9200 # 使用服務名稱連線
      - xpack.encryptedSavedObjects.encryptionKey=verylongrandomstringthatnooneknows
#      - ELASTICSEARCH_SSL_VERIFICATIONMODE=none
#      - ELASTICSEARCH_CA=/usr/share/kibana/config/http_ca.crt
    ports:
      - "5601:5601"
    volumes:
      - kibana_data:/usr/share/kibana/data
    depends_on:
      - elasticsearch

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"   # REST API + Web Console
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__SERVICE__WEB_PORT=6333  # 明確指定 Web Console 端口

  # 2. 任務中間人 (Redis)
  redis:
    image: redis:7.2-alpine  # 使用輕量級的 alpine 版本
    container_name: redis
    ports:
      - "6379:6379"          # 將容器的 6379 映射到主機的 6379
    volumes:
      - redis_data:/data     # 資料持久化掛載
    command: redis-server --appendonly yes  # 開啟 AOF 持久化模式，確保資料安全
    restart: always          # 確保容器崩潰或重啟後會自動啟動

volumes:
  es_data:
  kibana_data:
  qdrant_data:
  redis_data: