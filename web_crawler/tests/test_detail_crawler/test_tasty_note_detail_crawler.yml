category: 日式料理
description: 超適合作為便當菜及下飯菜色的經典日式料理「牛肉時雨煮」。加入大量薑末與甘鹹醬汁，即使放涼也一樣美味，記得多煮幾碗白飯，絕對會嗑爆！
ingredients:
- amount: 200g
  name: 牛肉（碎肉或薄肉片）
- amount: 10g
  name: 生薑
name: 日式常備菜，牛肉時雨煮
quantity: 1-2人份
seasoning:
- amount: 2大匙
  name: 砂糖
- amount: 3大匙
  name: 醬油
- amount: 各2大匙
  name: 味醂・料理酒（or米酒）
steps:
- img: https://tasty-note.com/wp-content/uploads/2025/12/f0962ebc51b5bed6b6cbb047ff776de9-300x225.jpg
  step: 1. 薑去皮後切絲。
- img: https://tasty-note.com/wp-content/uploads/2025/12/34952c7d023a6b03729c7b6846f6c4f3-300x225.jpg
  step: 2. 小鍋中放入薑末、砂糖、醬油、味醂、料理酒，以中火加熱，一邊攪拌一邊煮至沸騰。
- img: https://tasty-note.com/wp-content/uploads/2025/12/7c4733c32964c5b9b009fbed06024573-300x225.png
  step: 3. 沸騰後轉小火，加入牛肉，用筷子輕輕將牛肉撥散，讓肉片均勻受熱。若表面有浮出灰浮沫可以撈除，邊攪拌邊以小火～中小火煮約10分鐘。
- img: https://tasty-note.com/wp-content/uploads/2025/12/DSC09952-300x225.jpg
  step: '4. 煮到鍋底大略收汁時即可關火。

    放涼一會兒，讓味道更入味後即可享用。'
tags:
- 十分鐘料理
- 牛肉料理
